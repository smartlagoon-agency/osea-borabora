        - heading "Hiro Mulatier — Le lagon de Bora Bora, raconté de l'intérieur" [level=1] [ref=e47]
    - region "Hiro Mulatier" [ref=e48]:
      - generic [ref=e50]:
        - generic [ref=e51]:
          - img "Capitaine Hiro Mulatier, fondateur d'O-sea Bora Bora" [ref=e52]
          - generic [ref=e53]:
            - blockquote [ref=e54]: Ia ora na. Ce lagon, je le connais depuis l'enfance. Je veux vous le montrer comme personne d'autre ne peut le faire.
            - generic [ref=e55]: — Hiro Mulatier, Capitaine O-sea
        - generic [ref=e56]:
          - generic [ref=e57]: Fondateur & Capitaine
          - heading "Hiro Mulatier" [level=2] [ref=e58]
          - generic [ref=e59]:
            - paragraph [ref=e60]: Ia ora na. Je m'appelle Hiro Mulatier. Je suis né à Raiatea, aux Îles-Sous-le-Vent, et j'ai grandi entre l'océan et le lagon. Avant même de savoir nager correctement, je savais reconnaître une raie manta à sa silhouette dans le contre-jour.
            - paragraph [ref=e61]: J'ai passé des années dans l'hôtellerie nautique haut de gamme — au Four Seasons et chez Reef Discovery — où j'ai appris à guider des dizaines de nationalités différentes dans les eaux que j'aimais depuis l'enfance. J'ai compris que la différence entre une excursion ordinaire et un vrai souvenir, c'est la personne qui vous guide. Ce qu'elle sait. Ce qu'elle ressent pour ce lieu.
            - paragraph [ref=e62]: "J'ai fondé O-sea Bora Bora pour une raison simple : je voulais guider les gens comme j'aurais voulu être guidé moi-même. Pas en groupe de 20 à la queue leu leu. Pas avec un script récité. Avec une vraie connaissance du lagon, une vraie attention à ce que vous vivez, et un respect profond pour la faune marine que je vois comme une responsabilité, pas comme un décor."
            - paragraph [ref=e63]: Je suis aussi photographe. Quand je vous emmène dans l'eau, je sais où est la lumière et où sont les animaux. Si vous aimez les photos, on va en faire de belles.
    - region "Mélanie Mulatier" [ref=e64]:
      - generic [ref=e67]:
        - generic [ref=e68]: L'équipe O-sea
        - heading "Mélanie Mulatier" [level=2] [ref=e69]
        - paragraph [ref=e71]: Mélanie Mulatier est née et a grandi à Bora Bora. Elle gère les réservations et les détails opérationnels d'O-sea avec la même attention qu'elle apporte à ses clients. Passionnée de danse polynésienne, elle est souvent la première voix que vous entendez — et elle s'assure que votre arrivée sur le lagon se passe parfaitement.
        - img "Équipe O-sea Bora Bora — Hiro et Mélanie Mulatier" [ref=e73]
    - region "Ce en quoi nous croyons" [ref=e74]:
      - generic [ref=e75]:
        - generic [ref=e76]:
          - generic [ref=e77]: Nos valeurs
          - heading "Ce en quoi nous croyons" [level=2] [ref=e78]
        - list [ref=e79]:
          - listitem [ref=e80]: Connaissance locale — Hiro est né dans ces îles. Chaque excursion est guidée par une connaissance acquise en grandissant ici, pas apprise dans un manuel.
          - listitem [ref=e81]: Éco-responsabilité concrète — Pas de nourrissage des animaux. Pas de comportement perturbateur. Un briefing marin avant chaque sortie. Parce que ce lagon n'est pas un décor — c'est un écosystème vivant.
          - listitem [ref=e82]: Petits groupes par principe — Maximum 4 personnes sur les tours privés, jusqu'à 10 sur les tours partagés. Pour que chaque personne soit vraiment guidée, pas juste transportée.
          - listitem [ref=e83]: Honnêteté sur la faune — Lors de nos sorties, vous pouvez rencontrer raies, tortues et requins. Nous ne promettons jamais ce que la nature ne garantit pas — mais nous connaissons les probabilités mieux que personne.
